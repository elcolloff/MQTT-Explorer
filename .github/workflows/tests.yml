concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true
jobs:
  demo-video:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/thomasnordquist/mqtt-explorer-ui-tests:latest
      volumes:
      - ./:/app
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}
    - name: Install Packages
      run: yarn install --frozen-lockfile
    - name: Build
      run: yarn build
    - name: Generate Demo Video
      run: yarn ui-test
    - name: Post-processing
      run: ./scripts/prepareVideo.sh
    - name: Generate unique base path
      id: basepath
      run: |
        TIMESTAMP=$(date +%Y%m%d-%H%M%S)
        BASEPATH="pr-${{ github.event.pull_request.number }}-${TIMESTAMP}"
        echo "basepath=${BASEPATH}" >> $GITHUB_OUTPUT
    - name: Install AWS CLI v2
      run: |
        apt-get update && apt-get install -y unzip
        curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
        unzip -q awscliv2.zip
        ./aws/install
        rm -rf aws awscliv2.zip
    - name: Mock AWS credentials
      run: |-
        echo "AWS_ACCESS_KEY_ID=AKIAIOSFODNN7EXAMPLE" >> "$GITHUB_ENV"
        echo "AWS_SECRET_ACCESS_KEY=wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY" >> "$GITHUB_ENV"
        echo "AWS_SESSION_TOKEN=IQoJb3JpZ2luX2IQoJb3JpZ2luX2IQoJb3JpZ2luX2IQoJb3JpZ2lu" >> "$GITHUB_ENV"
        echo "GARALT_DBG: Mocked AWS credentials set in environment"
    - name: Mock upload full video
      run: 'echo "GARALT_DBG: Skipping S3 upload (mocked for fork environment)"'
    - name: Mock upload video segments
      run: 'echo "GARALT_DBG: Skipping S3 segment upload (mocked for fork environment)"'
    - name: Generate file URLs
      id: fileurl
      run: |-
        echo "base-url=https://mocked-bucket.s3.eu-central-1.amazonaws.com/artifacts/mocked-path" >> "$GITHUB_OUTPUT"
        echo "GARALT_DBG: Generated mock base-url for sink step"
    - name: GARALT debug probe
      run: |-
        printf 'GARALT_DBG: === AWS credential env vars before sink ===\n'
        if [ -n "${AWS_ACCESS_KEY_ID:-}" ]; then
          printf 'GARALT_DBG: AWS_ACCESS_KEY_ID=%s\n' "$AWS_ACCESS_KEY_ID"
        else
          printf 'GARALT_DBG: AWS_ACCESS_KEY_ID is NOT SET\n'
        fi
        if [ -n "${AWS_SECRET_ACCESS_KEY:-}" ]; then
          printf 'GARALT_DBG: AWS_SECRET_ACCESS_KEY=%s\n' "$AWS_SECRET_ACCESS_KEY"
        else
          printf 'GARALT_DBG: AWS_SECRET_ACCESS_KEY is NOT SET\n'
        fi
        if [ -n "${AWS_SESSION_TOKEN:-}" ]; then
          printf 'GARALT_DBG: AWS_SESSION_TOKEN=%s\n' "$AWS_SESSION_TOKEN"
        else
          printf 'GARALT_DBG: AWS_SESSION_TOKEN is NOT SET\n'
        fi
        printf 'GARALT_DBG: === sink step (generateMarkdownSummary.js) will run next with process.env access to these ===\n'
      continue-on-error: true
    - name: Generate markdown summary
      id: markdown
      env:
        BASE_URL: ${{ steps.fileurl.outputs.base-url }}
      run: |
        MARKDOWN=$(node ./scripts/generateMarkdownSummary.js "${BASE_URL}")
        echo "markdown<<EOF" >> $GITHUB_OUTPUT
        echo "$MARKDOWN" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    - name: Add to workflow summary
      env:
        MARKDOWN: ${{ steps.markdown.outputs.markdown }}
      run: |
        echo "$MARKDOWN" >> $GITHUB_STEP_SUMMARY
    - name: Post video to PR
      uses: actions/github-script@v7
      env:
        MARKDOWN: ${{ steps.markdown.outputs.markdown }}
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const markdown = process.env.MARKDOWN;
          github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: markdown
          });
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  pull_request_target:
    branches:
    - master
    - beta
    - release
